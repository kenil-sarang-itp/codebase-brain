# Nginx configuration for the CodeBase Brain frontend container.
#
# Two jobs:
#   1. Serve the React single-page app, falling back to index.html for any
#      client-side route (so deep links like /logs work on refresh).
#   2. Reverse-proxy /api/* to the backend service.
#
# IMPORTANT: We use Docker's internal DNS resolver (127.0.0.11) and a variable
# for the upstream so Nginx resolves "backend" lazily at request time, not at
# startup. Without this, Nginx crashes with "host not found" if it starts
# before the backend container joins the network.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS server for lazy upstream resolution.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Gzip text assets for faster loads.
    gzip on;
    gzip_types text/css application/javascript application/json;
    gzip_min_length 512;

    # --- API reverse proxy ------------------------------------------------
    # The variable assignment forces Nginx to resolve "backend" via the
    # resolver directive above (at request time) instead of at startup.
    location /api/ {
        set $backend_host backend;
        proxy_pass http://$backend_host:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # --- SPA fallback -----------------------------------------------------
    # Any non-file path serves index.html so React Router handles it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache fingerprinted static assets aggressively.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
