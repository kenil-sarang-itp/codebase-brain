# CodeBase Brain — postgres + redis + qdrant + pgadmin + worker.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codebrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codebrain}
      POSTGRES_DB: ${POSTGRES_DB:-codebrain}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codebrain}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "app.workers.rq_worker"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-codebrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codebrain}
      POSTGRES_DB: ${POSTGRES_DB:-codebrain}
      REDIS_HOST: redis
      QDRANT_HOST: qdrant
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCP_LOCATION: ${GCP_LOCATION:-us-central1}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/gcp-sa.json
      LLM_MODEL: ${LLM_MODEL:-gemini-2.0-flash}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-004}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      REPO_SOURCE: ${REPO_SOURCE:-local}
      LOCAL_REPO_PATH: /repo
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
    volumes:
      - ${LOCAL_REPO_MOUNT:-./sample-repo}:/repo:ro
      - ${GCP_CREDENTIALS_DIR:-./secrets}:/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    deploy:
      replicas: 2
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
